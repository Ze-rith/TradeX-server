server:
  port: 8081   # example-app(8080)과 동시 기동 가능

spring:
  application:
    name: tradex
  datasource:
    url: jdbc:postgresql://localhost:55432/chronos
    username: chronos
    password: chronos

chronos:
  storage: POSTGRES        # 테스트는 IN_MEMORY로 오버라이드
  cell-count: 3
  ontology-dir: ontology   # bootRun workingDir = 저장소 루트
  table-prefix: tradex_event_store   # example-app과 같은 DB를 공유하되 파티션 분리

tradex:
  auth:
    jwt:
      issuer: tradex
      access-ttl: 15m
      refresh-ttl: 14d
      key-id: tradex-rs256
      private-key-path: secrets/jwt-private.pem
      public-key-path: secrets/jwt-public.pem
