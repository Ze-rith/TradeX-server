services:
  postgres:
    image: postgres:16-alpine
    container_name: chronos-postgres
    environment:
      POSTGRES_DB: chronos
      POSTGRES_USER: chronos
      POSTGRES_PASSWORD: chronos
    ports:
      # 로컬에 이미 PostgreSQL이 있어도 충돌하지 않도록 비표준 호스트 포트를 쓴다
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chronos"]
      interval: 2s
      timeout: 2s
      retries: 15
