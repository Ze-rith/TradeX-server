spring:
  application:
    name: chronos-example
  datasource:
    url: jdbc:postgresql://localhost:55432/chronos
    username: chronos
    password: chronos

chronos:
  storage: POSTGRES        # 테스트는 IN_MEMORY로 오버라이드
  cell-count: 3
  virtual-nodes: 128
  ryw-timeout-ms: 2000
  ontology-dir: ontology   # bootRun workingDir = 저장소 루트
